version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: '03:23'
      timezone: Europe/London
    cooldown:
      default-days: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "03:33"
      timezone: "Europe/London"
    cooldown:
      default-days: 5

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: '03:43'
      timezone: Europe/London
    cooldown:
      default-days: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: '03:53'
      timezone: Europe/London
    cooldown:
      default-days: 5
